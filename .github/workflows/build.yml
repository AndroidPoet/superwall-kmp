name: Build & Test

on:
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :superwall:compileKotlinDesktop :superwall-compose:compileKotlinDesktop

      - name: Build Android
        run: ./gradlew :superwall:compileReleaseKotlinAndroid :superwall-compose:compileReleaseKotlinAndroid
